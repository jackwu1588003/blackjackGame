{% extends "layout.html" %}

{% block content %}
<div class="game-container">
    <div class="info-panel">
        <div class="chips">籌碼: $<span id="player-chips">{{ game.player_chips }}</span></div>
        <div class="bet">當前下注: $<span id="current-bet">{{ game.current_bet }}</span></div>
    </div>

    <div class="dealer-area">
        <h2>莊家</h2>
        <div class="score">分數: <span id="dealer-score">?</span></div>
        <div id="dealer-cards" class="cards"></div>
    </div>

    <div class="player-area">
        <h2>玩家</h2>
        <div class="score">分數: <span id="player-score">0</span></div>
        <div id="player-cards" class="cards"></div>
    </div>

    <div class="controls">
        <div class="betting-controls" id="betting-controls">
            <button class="bet-btn" data-amount="10">$10</button>
            <button class="bet-btn" data-amount="25">$25</button>
            <button class="bet-btn" data-amount="50">$50</button>
            <button class="bet-btn" data-amount="100">$100</button>
            <button id="deal-btn" disabled>發牌</button>
        </div>

        <div class="game-controls" id="game-controls" style="display: none;">
            <button id="hit-btn">要牌</button>
            <button id="stand-btn">停牌</button>
            <button id="double-btn">雙倍下注</button>
        </div>
    </div>

    <div class="message" id="message"></div>
</div>
{% endblock %}
